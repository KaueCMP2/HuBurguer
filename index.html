<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="scripts/script.js"></script>
    <link rel="stylesheet" href="styles/styles.css">
    <title>HuBurguer Home</title>
</head>

<body>
    <ul id="prod-list">
        <!-- LISTA DE PRODUTOS COM NOME, DESCRICAO, VALOR, QUANTIDADE, BOTAO PARA ADICIONAR AO PEDIDO -->
    </ul>
    <form>
        <h1>Add Products</h1>
        <span>Product name</span>
        <input type="text" id="name">

        <span>Price</span>
        <input type="number" id="price">

        <button type="submit" id="btn">End Buy</button>
    </form>
    <ul id="order-list">
        <!-- LISTA DE PRODUTOS PEDIDOS COM NOME, VALOR, QUANTIDADE, BOTAO PARA FINALIZAR PEDIDO -->

    </ul>
</body>

</html>
