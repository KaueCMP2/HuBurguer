<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="/scripts/login.js"></script>
    <link rel="stylesheet" href="/styles/login.css">
    <title>Login HuBurguer</title>
</head>

<body>
    <section id="side-space">
        <img src="/assets/img/ChatGPT Image 29 de mar. de 2026, 11_37_15 1.png"
            alt="Uma mulher sentada em uma poltrona e um celular grande ao seu lado, com 2 campos de input e um botao para login.">
    </section>
    <section id="form-conteiner">
        <form id="login-form">
            <h1>Login</h1>
            <div class="box">
                <span>E-mail</span>
                <input type="text" id="mail" placeholder="email@email.com">
            </div>

            <div class="box">
                <span>Password</span>
                <input type="password" id="pass" placeholder="*******">
                <button id="forgot-password">Forgot you password?</button>
            </div>
            <button type="submit" id="btn">Login</button>
        </form>
        <button id="btn-open-sign">Don't have account? Sign</button>
    </section>
</body>

</html>
