<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="/scripts/sign.js"></script>
    <link rel="stylesheet" href="/styles/sign.css">
    <title>Login HuBurguer</title>
</head>

<body>
    <section id="form-conteiner">
        <form id="login-form">
            <h1>Sign</h1>
            <div class="box">
                <span>Name</span>
                <input type="text" id="name" placeholder="You name">
            </div>

            <div class="box">
                <span>E-mail</span>
                <input type="email" id="mail" placeholder="email@email.com">
            </div>

            <div class="box">
                <span>Password</span>
                <input type="password" id="pass" placeholder="*******">
            </div>
            <button type="submit" id="btn">Sign</button>
        </form>
        <a href="">You have account? Login</a>
    </section>
    <section id="side-space">
        <img src="/assets/img/ChatGPT Image 29 de mar. de 2026, 11_38_05 1.png"
            alt="Um intregador de comida em uma moto com a logo do Huburguer estampado, em sua bolsa, com um celular ao lado">
    </section>
</body>

</html>
